project:
  name: "only-codex-research"
  mode: "full-auto"

research:
  topic: "Your research topic here"
  domains:
    - "machine-learning"
  daily_paper_count: 10
  quality_threshold: 4.0

runtime:
  timezone: "Asia/Shanghai"
  max_parallel_tasks: 3
  approval_timeout_hours: 12
  retry_limit: 2

notifications:
  channel: "console"
  target: ""
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

openclaw_bridge:
  use_cron: false
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: false

llm:
  provider: "supervisor"
  notes: "Codex-first supervisor mode; no ACP and no remote API key required."
  base_url: ""
  api_key_env: ""
  api_key: ""
  primary_model: "codex-supervisor"
  fallback_models: []
  supervisor:
    exchange_dir: ".researchclaw-supervisor"
    timeout_sec: 3600
    poll_interval_sec: 1.0

security:
  hitl_required_stages: [5, 9, 20]
  allow_publish_without_approval: false
  redact_sensitive_logs: true

experiment:
  mode: "sandbox"
  time_budget_sec: 300
  max_iterations: 10
  metric_key: "primary_metric"
  metric_direction: "minimize"
  sandbox:
    python_path: "python"
    gpu_required: false
    max_memory_mb: 4096
    allowed_imports:
      - "math"
      - "random"
      - "json"
      - "csv"
      - "time"
      - "os"
      - "sys"
      - "pathlib"
      - "typing"
      - "dataclasses"
      - "collections"
      - "itertools"
      - "functools"
      - "numpy"
      - "scipy"
      - "matplotlib"
      - "pandas"
      - "torch"
      - "sklearn"
  docker:
    image: "researchclaw/experiment:latest"
    gpu_enabled: true
    memory_limit_mb: 8192
    network_policy: "none"
    auto_install_deps: true
    shm_size_mb: 2048
    keep_containers: false

export:
  target_conference: "neurips_2025"
  authors: "Anonymous"
  bib_file: "references"

prompts:
  custom_file: ""

metaclaw_bridge:
  enabled: false
  proxy_url: "http://localhost:30000"
  skills_dir: "~/.metaclaw/skills"
  fallback_url: ""
  fallback_api_key: ""
  prm:
    enabled: false
    api_base: ""
    api_key_env: "PRM_API_KEY"
    api_key: ""
    model: "gpt-5.4"
    votes: 3
    gate_stages: [5, 9, 15, 20]
  lesson_to_skill:
    enabled: true
    min_severity: "error"
    max_skills_per_run: 3
